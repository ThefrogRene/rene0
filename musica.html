<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Sitio con Música</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #reproductor {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 9999; /* Asegura que esté sobre el sitio */
        }
    </style>
</head>
<body>

    <!-- El reproductor de audio persistente -->
    <div id="reproductor">
        <audio controls loop>
            <source src="https://www.youtube.com/shorts/v7zJ9LD_eoE" type="audio/mpeg">
            Tu navegador no soporta el audio.
        </audio>
    </div>

    <!-- Tu sitio de Hot Glue -->
    <iframe src="https://rene.hotglue.me/"></iframe>

</body>
</html>
